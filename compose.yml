---
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php
    build:
      context: .
      target: frankenphp_prod
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      DEFAULT_URI: https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}
      APP_SECRET: ${APP_SECRET:-!ChangeThisSymfonySecret!}
      SYMFONY_VERSION: ${SYMFONY_VERSION:-}
      STABILITY: ${STABILITY:-stable}
    volumes:
      # ── Minecraft data folders ──────────────────────────────────────────────
      # Mount each server's minecraft-data folder under /mc-data/<n>.
      # The app scans /mc-data/ at runtime — add/remove entries here to
      # control which servers are managed.
      # Define host paths in your .env file, e.g.:
      # MC_DATA_SERVER1=/home/user/minecraft-data
      - ${MC_DATA_SERVER1}:/mc-data/server1
      # - ${MC_DATA_SERVER2}:/mc-data/server2

      # ── Docker socket ───────────────────────────────────────────────────────
      # Used to discover running itzg/minecraft-bedrock-server containers
      # (name, ports, status) and to send restart signals.
      - /var/run/docker.sock:/var/run/docker.sock

      # ── Caddy persistence (TLS certs, config) ───────────────────────────────
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - name: https
        target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      - name: http3
        target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp

volumes:
  caddy_data:
  caddy_config:

